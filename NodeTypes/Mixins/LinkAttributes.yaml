'KaufmannDigital.EmailEditing:Mixin.LinkAttributes':
  abstract: true
  superTypes:
    'KaufmannDigital.EmailEditing:Mixin.Groups': true
  properties:
    linkColor:
      type: string
      ui:
        label: i18n
        help:
          message: i18n
        reloadPageIfChanged: true
        inspector:
          group: linking
    linkDecoration:
      type: string
      ui:
        label: i18n
        help:
          message: i18n
        reloadPageIfChanged: true
        inspector:
          group: linking
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            placeholder: i18n
            allowEmpty: true
            values:
              'none':
                label: i18n
              'underline':
                label: i18n
              'overline':
                label: i18n
              'line-through':
                label: i18n
    linkFontWeight:
      type: integer
      ui:
        label: i18n
        help:
          message: i18n
        reloadPageIfChanged: true
        inspector:
          group: linking
